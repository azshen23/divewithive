<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/assets/ive_logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IVE Updates</title>
  <meta name="description" content="A real-time minimalist news and updates timeline for the K-pop group IVE." />
  <meta property="og:title" content="Yujin for Marie Claire Korea Instagram Update" />
  <meta property="og:description"
    content="IVE has dropped a D-6 teaser image for their upcoming pre-release track 'LUCID DREAM', featuring a photo captured by Yujin." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://divewithive.com/images/2026-05-13/singapore_concert_group.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Yujin for Marie Claire Korea Instagram Update" />
  <meta name="twitter:description"
    content="IVE has dropped a D-6 teaser image for their upcoming pre-release track 'LUCID DREAM', featuring a photo captured by Yujin." />
  <meta name="twitter:image" content="https://divewithive.com/images/2026-05-13/singapore_concert_group.jpg" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script>
    // Record load start time
    window.appLoadTime = Date.now();

    // Global error listener for capturing resource load errors (scripts, stylesheets)
    window.addEventListener('error', function (e) {
      if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
        const url = e.target.src || e.target.href;
        console.error('Resource load failed:', url);
        
        const now = Date.now();
        const lastReload = sessionStorage.getItem('last-resource-reload');
        if (!lastReload || now - parseInt(lastReload, 10) > 10000) {
          sessionStorage.setItem('last-resource-reload', String(now));
          window.location.reload();
        }
      }
    }, true);

    // Listen for Vite dynamic import preload failures
    window.addEventListener('vite:preloadError', function (event) {
      console.error('Vite preload error:', event);
      const now = Date.now();
      const lastReload = sessionStorage.getItem('last-preload-reload');
      if (!lastReload || now - parseInt(lastReload, 10) > 10000) {
        sessionStorage.setItem('last-preload-reload', String(now));
        window.location.reload();
      }
    });

    // Reload if restored from browser back-forward cache (bfcache)
    window.addEventListener('pageshow', function (event) {
      if (event.persisted) {
        window.location.reload();
      }
    });

    // Check on tab focus/visibility if the React app is successfully mounted
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') {
        const root = document.getElementById('root');
        const isMounted = root && root.getAttribute('data-react-mounted') === 'true';
        const timeSinceLoad = Date.now() - (window.appLoadTime || 0);

        // If the app has been loaded for >4s but React is not mounted, force a reload
        if (!isMounted && timeSinceLoad > 4000) {
          const now = Date.now();
          const lastReload = sessionStorage.getItem('last-recovery-reload');
          if (!lastReload || now - parseInt(lastReload, 10) > 10000) {
            sessionStorage.setItem('last-recovery-reload', String(now));
            window.location.reload();
          }
        }
      }
    });
  </script>
</head>

<body>
  <div id="root">
    <div style="
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #0a0a0f;
      color: rgba(255, 255, 255, 0.8);
      font-family: 'Outfit', sans-serif;
      gap: 16px;
    ">
      <div style="
        width: 32px;
        height: 32px;
        border: 2px solid rgba(52, 211, 153, 0.2);
        border-top-color: #34d399;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      "></div>
      <p style="font-size: 14px; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.05em; margin: 0;">Lacing up diving gear...</p>
    </div>
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
