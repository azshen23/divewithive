name: IVE Timeline Agent (Every 4 Hours)

on:
  schedule:
    # Runs every 4 hours
    - cron: '0 */4 * * *'
  # Allows you to run the action manually from the Actions tab
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants the action permission to push commits to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run AI Agent Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_REGION: ${{ secrets.B2_REGION }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
          B2_PUBLIC_URL: ${{ secrets.B2_PUBLIC_URL }}
        run: node agent.js

      - name: Commit and Push Changes
        run: |
          # Configure Git to act as a bot
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the updated JSON file, archive shards (if any), and index.html
          git add src/data/timeline.json index.html
          if [ -d "src/data/archive" ]; then
            git add src/data/archive/
          fi
          
          # Only commit and push if there are actual changes, bypassing husky git hooks
          if ! git diff --staged --quiet; then
            git commit --no-verify -m "Auto-update timeline via AI Agent [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
